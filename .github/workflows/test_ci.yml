name: TEST CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


permissions:
    checks: write
    contents: read

jobs:
  test:
    name: Run Vitest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      #   Automatically install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create reports directory
        run: mkdir -p reports

      #   Run full test suite
      - name: Run tests
        run: pnpm exec vitest run --reporter=default --reporter=junit --outputFile.junit=reports/results.xml

      #  Test summary renders a pass/fail table in the GitHub Actions UI
      - name: Publish test summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: reports/results.xml
          fail_on_failure: true
          require_tests: true

      #  Artifact upload — downloadable XML report from every run
      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/results.xml
          if-no-files-found: warn